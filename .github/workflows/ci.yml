name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run prettier:check

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --watch=false

      - name: Build
        if: github.event_name == 'pull_request'
        run: npm run build
